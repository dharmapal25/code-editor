        background-color: #333;

    .navbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        background-color: #444;
        padding: 10px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        padding: 10px;
    }

    .navbar a:hover {
        background-color: #555;
    }

    /* responsive navbar */
    @media (max-width: 600px) {
        .navbar {
            flex-direction: column;
        }
        .navbar a {
            width: 100%;
        }
    }

    /* hamburger icon */
    .hamburger {
        display: none;
    }

    .hamburger:hover {
        cursor: pointer;
    }

    @media (max-width: 600px) {
        .hamburger {
            display: block;
        }
    }

    /* navbar toggle */
    .navbar-toggle {
        display: none;
    }

    @media (max-width: 600px) {
        .navbar-toggle {
            display: block;
        }
    }

    .navbar-toggle:checked ~ .navbar {
        display: block;
    }
</style>
