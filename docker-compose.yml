services:
  server:
    build: ./server
    container_name: ts_backend
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npx tsx watch --clear-screen=false server.ts

  client:
    build: ./client
    container_name: ts_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npx vite --host 0.0.0.0